<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Video Asset - Estate Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-actions { margin-top: 20px; }
        .form-actions button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        .error { color: #d32f2f; font-size: 0.9em; }
        .image-preview { max-width: 200px; margin-top: 10px; }
        .danger-zone { margin-top: 40px; padding: 20px; border: 1px solid #d32f2f; border-radius: 4px; }
        .danger-zone button { background-color: #d32f2f; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit Video Asset</h1>
        
        <form method="POST" enctype="multipart/form-data" id="editVideoForm">
            <div style="max-width: 500px;">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" value="{{ video.title }}" required>
                    <div class="error" id="titleError"></div>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" required>{{ video.description }}</textarea>
                    <div class="error" id="descriptionError"></div>
                </div>
                
                <div class="form-group">
                    <label for="location_id">Location</label>
                    <select id="location_id" name="location_id">
                        <option value="">-- Select Location --</option>
                        {% for location in locations %}
                            <option value="{{ location.location_id }}" 
                                {% if location.location_id == video.location_id %}selected{% endif %}>
                                {{ location.location_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="format">Format</label>
                    <select id="format" name="format">
                        <option value="">-- Select Format --</option>
                        <option value="DVD" {% if video.format == 'DVD' %}selected{% endif %}>DVD</option>
                        <option value="Blu-ray" {% if video.format == 'Blu-ray' %}selected{% endif %}>Blu-ray</option>
                        <option value="Digital" {% if video.format == 'Digital' %}selected{% endif %}>Digital</option>
                        <option value="VHS" {% if video.format == 'VHS' %}selected{% endif %}>VHS</option>
                        <option value="USB" {% if video.format == 'USB' %}selected{% endif %}>USB</option>
                        <option value="Other" {% if video.format == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="value">Value ($)</label>
                    <input type="number" id="value" name="value" step="0.01" min="0" 
                        value="{% if video.value %}{{ video.value }}{% endif %}">
                </div>
                
                <div class="form-group">
                    <label for="disposition">Disposition</label>
                    <select id="disposition" name="disposition">
                        <option value="">-- Select Disposition --</option>
                        <option value="Keep" {% if video.disposition == 'Keep' %}selected{% endif %}>Keep</option>
                        <option value="Sell" {% if video.disposition == 'Sell' %}selected{% endif %}>Sell</option>
                        <option value="Donate" {% if video.disposition == 'Donate' %}selected{% endif %}>Donate</option>
                        <option value="Discard" {% if video.disposition == 'Discard' %}selected{% endif %}>Discard</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="upc">UPC / ISBN</label>
                    <input type="text" id="upc" name="upc" maxlength="12" value="{{ video.upc or '' }}">
                </div>
                
                <div class="form-group">
                    <label for="cover_image_url">Cover Image URL</label>
                    <input type="url" id="cover_image_url" name="cover_image_url" 
                        value="{{ video.cover_image_url or '' }}">
                </div>
                
                <div class="form-group">
                    <label for="image_file">Upload New Image</label>
                    <input type="file" id="image_file" name="image_file" accept="image/*">
                    <small>Allowed: JPG, PNG, GIF (max 16MB)</small>
                    {% if video.image_url %}
                        <p>Current image: <a href="{{ video.image_url }}" target="_blank">View</a></p>
                    {% endif %}
                    <img id="imagePreview" class="image-preview" style="display:none;">
                    <input type="hidden" id="existing_image_url" name="existing_image_url" 
                        value="{{ video.image_url or '' }}">
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes">{{ video.notes or '' }}</textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit">Update Video Asset</button>
                    <a href="/videos"><button type="button">Cancel</button></a>
                </div>
            </div>
        </form>
        
        <div class="danger-zone">
            <h3>Danger Zone</h3>
            <p>Archive this video asset (can be restored later):</p>
            <button onclick="archiveVideo({{ video.asset_id }})">Archive Video</button>
            <p style="margin-top: 15px;">Permanently delete this video asset:</p>
            <button onclick="deleteVideo({{ video.asset_id }})" style="background-color: #b71c1c;">Delete Video</button>
        </div>
    </div>

    <script>
        function archiveVideo(assetId) {
            if (confirm('Archive this video? It can be restored later.')) {
                fetch(`/videos/${assetId}/archive`, { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href = '/videos';
                        } else {
                            alert('Error: ' + data.error);
                        }
                    });
            }
        }
        
        function deleteVideo(assetId) {
            if (confirm('WARNING: This will permanently delete this video asset. This cannot be undone.')) {
                if (confirm('Are you absolutely sure?')) {
                    fetch(`/videos/${assetId}/delete`, { method: 'POST' })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                window.location.href = '/videos';
                            } else {
                                alert('Error: ' + data.error);
                            }
                        });
                }
            }
        }
        
        document.getElementById('image_file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        document.getElementById('editVideoForm').addEventListener('submit', function(e) {
            document.getElementById('titleError').textContent = '';
            document.getElementById('descriptionError').textContent = '';
            
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!title) {
                e.preventDefault();
                document.getElementById('titleError').textContent = 'Title is required';
            }
            
            if (!description) {
                e.preventDefault();
                document.getElementById('descriptionError').textContent = 'Description is required';
            }
        });
    </script>
</body>
</html>
