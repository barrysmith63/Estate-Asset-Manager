<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Video Asset - Estate Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-actions { margin-top: 20px; }
        .form-actions button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        .error { color: #d32f2f; font-size: 0.9em; }
        .image-preview { max-width: 200px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add New Video Asset</h1>
        
        <form method="POST" enctype="multipart/form-data" id="addVideoForm">
            <div style="max-width: 500px;">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" required>
                    <div class="error" id="titleError"></div>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" required></textarea>
                    <div class="error" id="descriptionError"></div>
                </div>
                
                <div class="form-group">
                    <label for="location_id">Location</label>
                    <select id="location_id" name="location_id">
                        <option value="">-- Select Location --</option>
                        {% for location in locations %}
                            <option value="{{ location.location_id }}">{{ location.location_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="format">Format</label>
                    <select id="format" name="format">
                        <option value="">-- Select Format --</option>
                        <option value="DVD">DVD</option>
                        <option value="Blu-ray">Blu-ray</option>
                        <option value="Digital">Digital</option>
                        <option value="VHS">VHS</option>
                        <option value="USB">USB</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="value">Value ($)</label>
                    <input type="number" id="value" name="value" step="0.01" min="0">
                </div>
                
                <div class="form-group">
                    <label for="disposition">Disposition</label>
                    <select id="disposition" name="disposition">
                        <option value="">-- Select Disposition --</option>
                        <option value="Keep">Keep</option>
                        <option value="Sell">Sell</option>
                        <option value="Donate">Donate</option>
                        <option value="Discard">Discard</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="upc">UPC / ISBN</label>
                    <input type="text" id="upc" name="upc" maxlength="12">
                </div>
                
                <div class="form-group">
                    <label for="cover_image_url">Cover Image URL</label>
                    <input type="url" id="cover_image_url" name="cover_image_url">
                </div>
                
                <div class="form-group">
                    <label for="image_file">Upload Image</label>
                    <input type="file" id="image_file" name="image_file" accept="image/*">
                    <small>Allowed: JPG, PNG, GIF (max 16MB)</small>
                    <img id="imagePreview" class="image-preview" style="display:none;">
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit">Save Video Asset</button>
                    <a href="/videos"><button type="button">Cancel</button></a>
                </div>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('image_file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        document.getElementById('addVideoForm').addEventListener('submit', function(e) {
            // Clear previous errors
            document.getElementById('titleError').textContent = '';
            document.getElementById('descriptionError').textContent = '';
            
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!title) {
                e.preventDefault();
                document.getElementById('titleError').textContent = 'Title is required';
            }
            
            if (!description) {
                e.preventDefault();
                document.getElementById('descriptionError').textContent = 'Description is required';
            }
        });
    </script>
</body>
</html>
